<section>
    <h2>核心语法</h2>
    <ul>
        <li>-기 때문에 ：因为...</li>
        <li>-아/어서 ：连接原因或顺序</li>
        <li>-지만 ：但是</li>
        <li>-려고 하다 ：打算...</li>
    </ul>
</section>

<section>
    <h2>高频词汇</h2>
    <ul>
        <li>경험 - 经验</li>
        <li>문화 - 文化</li>
        <li>사회 - 社会</li>
        <li>경제 - 经济</li>
        <li>문제 - 问题</li>
    </ul>
</section>

<section>
    <h2>例句练习</h2>
    <ul>
        <li>비가 오기 때문에 집에 있어요.（因为下雨所以在家）</li>
        <li>한국 문화를 배우려고 해요.（打算学习韩国文化）</li>
        <li>비싸지만 필요해요.（虽然贵但是需要）</li>
    </ul>
</section>
