<section>
    <h2>核心语法</h2>
    <ul>
        <li>-이에요 / -예요 ：表示“是”</li>
        <li>-은 / -는 ：主题标记</li>
        <li>-이 / -가 ：主语标记</li>
        <li>-을 / -를 ：宾语标记</li>
    </ul>
</section>

<section>
    <h2>高频词汇</h2>
    <ul>
        <li>학생 - 学生</li>
        <li>학교 - 学校</li>
        <li>책 - 书</li>
        <li>물 - 水</li>
        <li>사람 - 人</li>
    </ul>
</section>

<section>
    <h2>例句练习</h2>
    <ul>
        <li>저는 학생이에요. （我是学生）</li>
        <li>학교에 가요. （去学校）</li>
        <li>책을 읽어요. （读书）</li>
    </ul>
</section>
