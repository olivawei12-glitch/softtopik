<body>

    <nav class="top-nav">
        <a href="index.html">首页</a>
        <a href="topik.html">TOPIK</a>
        <a href="grammar.html">语法</a>
    </nav>

    <h1>SoftTOPIK</h1>
    <p class="subtitle">温和而系统地掌握 TOPIK 考试</p>

    <div class="buttons">
        <a href="topik.html" class="btn">进入 TOPIK 专区</a>

<!-- 每日一句 -->
<section>
    <h2>每日一句</h2>

    <p id="chinese-translation"></p>
</section>

<!-- 今日小测 -->
<section>
    <h2>今日小测</h2>
    <p id="quiz-question"></p>
    <button onclick="showAnswer()">显示答案</button>
    <p id="quiz-answer" style="display:none;"></p>
    <br>
    <button onclick="nextQuiz()">下一题</button>
</section>

<section class="why">
    <h2>为什么选择 SoftTOPIK？</h2>
    <p>
        TOPIK 备考不应该焦虑混乱。  
        我们将考试结构、语法体系与等级路径拆解为清晰步骤，  
        用稳定、温和、可持续的方式推进学习。
    </p>
</section>

<section class="modules">
    <div class="card">
        <h3>TOPIK 全阶段结构</h3>
        <p>从 1级 到 6级，理解考试构成与得分逻辑。</p>
        <a href="topik.html">开始了解 →</a>
    </div>

    <div class="card">
        <h3>语法系统基础</h3>
        <p>围绕 TOPIK 高频语法进行系统整理。</p>
        <a href="grammar.html">查看语法 →</a>
    </div>
</section>

<footer>
    <p>© 2026 SoftTOPIK. 专注中文学习者的 TOPIK 系统站。</p>
</footer>

<script>
// ===== 每日一句 =====
const sentences = [
    { ko: "오늘은 날씨가 좋아요.", zh: "今天天气很好。" },
    { ko: "저는 한국어를 공부해요.", zh: "我在学习韩语。" },
    { ko: "천천히 가도 괜찮아요.", zh: "慢慢来也没关系。" },
    { ko: "포기하지 마세요.", zh: "不要放弃。" },
    { ko: "노력은 배신하지 않아요.", zh: "努力不会背叛你。" }
];

const randomIndex = Math.floor(Math.random() * sentences.length);
document.getElementById("korean-sentence").innerText = sentences[randomIndex].ko;
document.getElementById("chinese-translation").innerText = sentences[randomIndex].zh;


// ===== 今日小测 =====
const quizzes = [
    { q: "-지만 的意思是什么？", a: "表示“虽然...但是...”" },
    { q: "-기 때문에 表示什么？", a: "表示“因为...”" },
    { q: "-려고 하다 的意思？", a: "表示“打算做某事”" },
    { q: "-더라도 表示什么？", a: "表示“即使...”" }
];

let currentQuiz = 0;

function loadQuiz() {
    document.getElementById("quiz-question").innerText = quizzes[currentQuiz].q;
    document.getElementById("quiz-answer").innerText = quizzes[currentQuiz].a;
    document.getElementById("quiz-answer").style.display = "none";
}

function showAnswer() {
    document.getElementById("quiz-answer").style.display = "block";
}

function nextQuiz() {
    currentQuiz = (currentQuiz + 1) % quizzes.length;
    loadQuiz();
}

loadQuiz();
</script>

</body>
</html>
